<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Historical Sensor Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .back-btn {
            display: inline-block;
            margin: 15px;
            padding: 6px 12px;
            background: #0077ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: #005fcc;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        canvas {
            width: 100%;
            max-width: 900px;
            height: 250px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">⬅ Back to Live Dashboard</a>
    <h1>Historical Sensor Data</h1>
    <canvas id="levelChart"></canvas>
    <canvas id="tdsChart"></canvas>
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            let ts = {{ timestamps | tojson }};
            let lv = {{ levels | tojson }};
            let tds = {{ tds_values | tojson }};
            function createChart(ctxId, label, data, color) {
                new Chart(document.getElementById(ctxId), {
                    type: 'line',
                    data: {
                        labels: ts,
                        datasets: [{
                            label: label,
                            data: data,
                            borderColor: color,
                            fill: false,
                            tension: 0.2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Time'
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: label
                                }
                            }
                        }
                    }
                });
            }
            createChart('levelChart', 'Water Level (cm)', lv, 'blue');
            createChart('tdsChart', 'TDS (ppm)', tds, 'orange');
        });
    </script>
</body>
</html>
