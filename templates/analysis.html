<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Historical Sensor Data</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 20px;
			background: #f5f6fa;
		}
		h1 {
			text-align: center;
			margin-bottom: 30px;
		}
		h2 {
			margin-top: 40px;
			margin-bottom: 10px;
		}
		.back-btn {
			display: inline-block;
			margin-bottom: 20px;
			padding: 8px 14px;
			background: #0077ff;
			color: white;
			text-decoration: none;
			border-radius: 6px;
			font-size: 0.9rem;
		}
		.back-btn:hover {
			background: #005fcc;
		}
		.chart-container {
			width: 100%;
			height: 320px;
			margin-bottom: 40px;
			background: white;
			padding: 15px;
			border-radius: 10px;
			box-shadow: 0 2px 6px rgba(0,0,0,0.1);
		}
	</style>
</head>
<body>
	<a href="/" class="back-btn">⬅ Back to Live Dashboard</a>
	<h1>Historical Sensor Data</h1>
	<h2>Water Level History</h2>
	<div class="chart-container">
		<canvas id="levelChart"></canvas>
	</div>
	<h2>TDS History</h2>
	<div class="chart-container">
		<canvas id="tdsChart"></canvas>
	</div>
	<script>
		window.addEventListener('DOMContentLoaded', function() {
			let ts = {{ timestamps | tojson }};
			let lv = {{ levels | tojson }};
			let tds = {{ tds_values | tojson }};
			function createChart(ctxId, label, data, color) {
				new Chart(document.getElementById(ctxId), {
					type: 'line',
					data: {
						labels: ts,
						datasets: [{
							label: label,
							data: data,
							borderColor: color,
							backgroundColor: 'rgba(0,0,0,0.05)',
							fill: true,
							tension: 0.2
						}]
					},
					options: {
						responsive: true,
						maintainAspectRatio: false,
						scales: {
							x: {
								title: {
									display: true,
									text: 'Time'
								}
							},
							y: {
								title: {
									display: true,
									text: label
								}
							}
						}
					}
				});
			}
			createChart(
				'levelChart',
				'Water Level (cm)',
				lv,
				'blue'
			);
			createChart(
				'tdsChart',
				'TDS (ppm)',
				tds,
				'orange'
			);
		});
	</script>
</body>
</html>
